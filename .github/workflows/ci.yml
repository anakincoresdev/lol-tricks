name: CI/CD

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  build:
    needs: lint
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_API_BASE: https://lol-tricks.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static production build
        run: npm run generate

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_USER:?Missing VPS_USER secret}"
          : "${VPS_SSH_KEY:?Missing VPS_SSH_KEY secret}"
          VPS_HOST="${VPS_HOST#ssh://}"
          VPS_HOST="${VPS_HOST#*@}"
          VPS_HOST="${VPS_HOST%%/*}"
          if [[ "$VPS_HOST" == *:* ]]; then
            HOST_PORT="${VPS_HOST##*:}"
            VPS_HOST="${VPS_HOST%%:*}"
            VPS_PORT="${VPS_PORT:-$HOST_PORT}"
          fi
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "sudo /usr/local/sbin/deploy-lol-tricks '$DEPLOY_BRANCH'"
